server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip text assets (audio/png are already compressed and skipped)
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;

    # SPA-ish single page: always fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # hashed build assets — cache hard
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # the soundtrack — allow range requests, cache a while
    location /audio/ {
        add_header Cache-Control "public, max-age=604800";
        add_header Accept-Ranges bytes;
        try_files $uri =404;
    }

    location = /cover.png {
        expires 30d;
        add_header Cache-Control "public";
    }

    # never cache the HTML shell
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # basic hardening
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
